<body>
<div class="header">
  <button class="back-btn" onclick="location.href='inicio-vicente.html'">← Volver</button>
  <h1 style="color:white;font-size:1.1em">📦 Almacén — V.ESPI</h1>
  <div style="width:80px"></div>
</div>
<div id="print-area"></div>
<div class="container">
  <div class="tabs">
    <button class="tab activo" onclick="setTab('lotes')">📦 Lotes</button>
    <button class="tab" onclick="setTab('recepciones')">📥 Recepciones</button>
    <button class="tab" onclick="setTab('semana')">📋 Semana</button>
    <button class="tab" onclick="setTab('pinos')">⚙️ Piños</button>
  </div>

  <!-- TAB LOTES -->
  <div id="tab-lotes">
    <div style="display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;">
      <button class="btn-print" onclick="imprimirAlmacen()">🖨️ Imprimir Almacén</button>
    </div>
    <div id="lotes-container"><div class="empty-state"><div class="icon">⏳</div><p>Cargando…</p></div></div>
  </div>

  <!-- TAB RECEPCIONES -->
  <div id="tab-recepciones" style="display:none">
    <div style="display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;">
      <button class="btn-fab" onclick="abrirRecepcion(null)">＋ Nueva Recepción</button>
      <button class="btn-print" onclick="imprimirRecepciones()">🖨️ Imprimir</button>
    </div>
    <div class="filtros">
      <input type="text" id="buscarRec" placeholder="🔍 Buscar lote, material…" oninput="filtrarRec()">
      <select id="filtrocat" onchange="filtrarRec()">
        <option value="">Todas las categorías</option>
        <option value="FIBRAS">Fibras</option>
        <option value="PARAFINA">Parafina</option>
        <option value="PORTAMECHAS">Portamechas</option>
        <option value="COLORANTE">Colorante</option>
        <option value="OTROS">Otros</option>
      </select>
    </div>
    <div style="overflow-x:auto;">
      <table class="rec-tabla">
        <thead><tr>
          <th>Fecha</th>
          <th>Proveedor</th>
          <th>Material</th>
          <th>Lote</th>
          <th>Cantidad</th>
          <th>Albarán</th>
          <th>Control</th>
          <th>Operario</th>
          <th></th>
        </tr></thead>
        <tbody id="recTablaBody"><tr><td colspan="9" style="text-align:center;padding:20px;color:#aaa">Cargando…</td></tr></tbody>
      </table>
    </div>
  </div>

  <!-- TAB SEMANA -->
  <div id="tab-semana" style="display:none">
    <div style="background:#fff;border-radius:14px;padding:16px;margin-bottom:14px;box-shadow:0 2px 8px rgba(0,0,0,.06);">
      <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end;">
        <div style="flex:0 0 80px;">
          <label style="font-size:11px;font-weight:600;color:#7f8c8d;text-transform:uppercase;display:block;margin-bottom:4px;">Semana</label>
          <input type="number" id="semNum" min="1" max="53" style="width:100%;padding:10px;border:1px solid #dde3ee;border-radius:10px;font-size:15px;">
        </div>
        <div style="flex:1;min-width:180px;">
          <label style="font-size:11px;font-weight:600;color:#7f8c8d;text-transform:uppercase;display:block;margin-bottom:4px;">Período</label>
          <input type="text" id="semPeriodo" style="width:100%;padding:10px;border:1px solid #dde3ee;border-radius:10px;font-size:14px;">
        </div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;">
          <button onclick="cargarSemana()" style="background:#1e2a44;color:#fff;border:none;padding:11px 16px;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;">Cargar</button>
          <button onclick="guardarSemana()" style="background:#27ae60;color:#fff;border:none;padding:11px 16px;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;">💾</button>
          <button onclick="imprimirSemana()" class="btn-print" style="padding:11px 16px;font-size:14px;">🖨️ Imprimir</button>
        </div>
      </div>
    </div>
    <div id="semana-container"><div class="empty-state"><div class="icon">📋</div><p>Carga una semana.</p></div></div>
  </div>

  <!-- TAB PIÑOS -->
  <div id="tab-pinos" style="display:none">
    <div style="display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap;align-items:center;">
      <div style="display:flex;flex-direction:column;">
        <label style="font-size:11px;font-weight:600;color:#7f8c8d;text-transform:uppercase;margin-bottom:4px;">Semana</label>
        <input type="number" id="pinoSemNum" min="1" max="53" style="width:80px;padding:10px;border:1px solid #dde3ee;border-radius:10px;font-size:15px;">
      </div>
      <button onclick="imprimirPinos()" class="btn-print" style="margin-top:20px;">🖨️ Imprimir Piños</button>
    </div>
    <p style="font-size:13px;color:#7f8c8d;background:#fff;padding:14px 18px;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,.06);">
      Hoja en blanco para que los operarios rellenen a mano. Introduce el número de semana y pulsa Imprimir.
    </p>
  </div>
</div>

<!-- MODAL RECEPCIÓN -->
<div class="modal-overlay" id="modalRec">
  <div class="modal-box">
    <h3 id="modalRecTitulo">📥 Nueva Recepción</h3>
    <input type="hidden" id="recEditId">
    <div style="display:flex;gap:8px;">
      <div class="fg" style="flex:1"><label>Fecha</label><input type="date" id="rFecha"></div>
      <div class="fg" style="flex:1"><label>Operario</label><input type="text" id="rOperario" value="TINO"></div>
    </div>
    <div class="fg"><label>Categoría</label>
      <select id="rCategoria">
        <option value="FIBRAS">Fibras</option>
        <option value="PARAFINA">Parafina / Ceras</option>
        <option value="PORTAMECHAS">Portamechas</option>
        <option value="COLORANTE">Colorante</option>
        <option value="OTROS">Otros</option>
      </select>
    </div>
    <div class="fg"><label>Proveedor</label>
      <select id="rProveedor" onchange="generarLote()">
        <option value="CO">COLOURNOU</option>
        <option value="MI">MIMCORD</option>
        <option value="RI">RIMAFIL</option>
        <option value="BE">BESTWAX</option>
        <option value="ANIC">ANIC</option>
        <option value="JOE">JOE</option>
        <option value="IB">IBERCERAS</option>
        <option value="LUX">LUXCHEM</option>
        <option value="AM">AMWAX</option>
      </select>
    </div>
    <div class="fg"><label>Material</label><input type="text" id="rMaterial" placeholder="ej: A30, R6, 3034…" oninput="generarLote()" style="text-transform:uppercase"></div>
    <div class="fg"><label>Lote (editable)</label><input type="text" id="rLote" style="font-family:monospace;font-weight:700;text-transform:uppercase"></div>
    <div class="fg"><label>Cantidad</label><input type="text" id="rCantidad" placeholder="ej: 1000 kg"></div>
    <div style="display:flex;gap:8px;">
      <div class="fg" style="flex:1"><label>Albarán</label><input type="text" id="rAlbaran"></div>
      <div class="fg" style="flex:1"><label>Control visual</label>
        <select id="rControl"><option value="OK">OK</option><option value="NO OK">NO OK</option></select>
      </div>
    </div>
    <div class="fg"><label>Observaciones</label><input type="text" id="rObs"></div>
    <div class="modal-actions">
      <button class="btn-ok" onclick="confirmarRec()">✅ Guardar</button>
      <button class="btn-cancel" onclick="cerrarModal('modalRec')">Cancelar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let db, colLotes, colRec, colSem;
let lotesCache=[], recCache=[], semMaterias=[], semId=null;

firebase.auth().onAuthStateChanged(u=>{
  if(!u){ location.href='index.html'; return; }
  db=firebase.firestore();
  colLotes=db.collection('almacen_lotes_vespi');
  colRec=db.collection('almacen_recepciones_vespi');
  colSem=db.collection('almacen_semanas_vespi');
  init();
});

function init(){
  const hoy=new Date().toISOString().split('T')[0];
  document.getElementById('rFecha').value=hoy;
  document.getElementById('semNum').value=getSemana();
  document.getElementById('pinoSemNum').value=getSemana();
  document.getElementById('semPeriodo').value=getPeriodo();
  cargarLotes();
  cargarRecepciones();
}

// ── TABS ──
function setTab(n){
  ['lotes','recepciones','semana','pinos'].forEach(t=>{
    document.getElementById('tab-'+t).style.display=t===n?'':'none';
  });
  document.querySelectorAll('.tab').forEach((el,i)=>{
    el.classList.toggle('activo',['lotes','recepciones','semana','pinos'][i]===n);
  });
}

// ── LOTES ──
async function cargarLotes(){
  const cont=document.getElementById('lotes-container');
  try{
    const snap=await colLotes.get();
    lotesCache=snap.docs.map(d=>({id:d.id,...d.data()})).filter(l=>l.estado!=='agotado');
    renderLotes();
  }catch(e){ cont.innerHTML='<div class="empty-state"><div class="icon">❌</div><p>Error: '+e.message+'</p></div>'; }
}

function renderLotes(){
  const cont=document.getElementById('lotes-container');
  if(!lotesCache.length){ cont.innerHTML='<div class="empty-state"><div class="icon">📦</div><p>Sin lotes. Añade una recepción.</p></div>'; return; }
  const grupos={};
  lotesCache.forEach(l=>{
    const cat=l.categoria||'OTROS';
    const mat=l.material||'—';
    if(!grupos[cat]) grupos[cat]={};
    if(!grupos[cat][mat]) grupos[cat][mat]=[];
    grupos[cat][mat].push(l);
  });
  const ORDEN=['FIBRAS','PORTAMECHAS','PARAFINA','COLORANTE','OTROS'];
  const cats=ORDEN.filter(c=>grupos[c]).concat(Object.keys(grupos).filter(c=>!ORDEN.includes(c)));
  cont.innerHTML=cats.map(cat=>`
    <div style="margin-bottom:18px;">
      <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#7f8c8d;margin-bottom:8px;padding-bottom:5px;border-bottom:2px solid #f4f7fa;">${cat}</div>
      ${Object.entries(grupos[cat]).map(([mat,ls])=>`
        <div class="materia-card">
          <div class="mat-header">
            <div class="mat-nombre">${mat}</div>
            <div style="font-size:11px;color:#7f8c8d">${ls.filter(l=>l.estado==='en_uso').length} en uso · ${ls.filter(l=>l.estado==='almacen').length} en almacén</div>
          </div>
          <div class="mat-body">
            ${ls.sort((a,b)=>a.estado==='en_uso'?-1:1).map(l=>`
              <div class="lote-row">
                <div style="flex:1">
                  <div class="lote-cod">${l.lote}</div>
                  <div class="lote-det">${l.cantidad||''} ${l.albaran?'· Alb: '+l.albaran:''}</div>
                </div>
                <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;">
                  <span class="${l.estado==='en_uso'?'badge-uso':'badge-alm'}">${l.estado==='en_uso'?'EN USO':'ALMACÉN'}</span>
                  ${l.estado==='almacen'?`<button class="btn-sm btn-usar" onclick="marcarUso('${l.id}','${mat}')">▶ Usar</button>`:''}
                  <button class="btn-sm btn-agotar" onclick="marcarAgotado('${l.id}','${mat}')">✓ Agotado</button>
                  <button class="btn-sm" style="background:#f4f7fa;color:#1e2a44;" onclick="impEtLote('${l.lote}','${mat}','${l.fechaEntrada||''}',2)">🏷️</button>
                </div>
              </div>`).join('')}
          </div>
        </div>`).join('')}
    </div>`).join('');
}

async function marcarUso(id,mat){
  if(!confirm(`¿Marcar este lote de ${mat} como EN USO?`)) return;
  try{
    await colLotes.doc(id).update({estado:'en_uso',fechaUso:new Date().toISOString()});
    toast('✅ Lote en uso','ok'); cargarLotes();
  }catch(e){ toast('❌ '+e.message,'err'); }
}

async function marcarAgotado(id,mat){
  if(!confirm(`¿Marcar lote de ${mat} como AGOTADO?`)) return;
  try{
    await colLotes.doc(id).update({estado:'agotado',fechaAgotado:new Date().toISOString()});
    const sig=lotesCache.filter(l=>l.material===mat&&l.estado==='almacen'&&l.id!==id)
      .sort((a,b)=>(a.fechaEntrada||'').localeCompare(b.fechaEntrada||''))[0];
    if(sig){
      if(confirm(`¿Pasar "${sig.lote}" a EN USO?`)){
        await colLotes.doc(sig.id).update({estado:'en_uso',fechaUso:new Date().toISOString()});
        toast('✅ Siguiente lote en uso: '+sig.lote,'ok');
      }
    } else toast('⚠️ Sin más lotes para '+mat,'ok');
    cargarLotes();
  }catch(e){ toast('❌ '+e.message,'err'); }
}

// ── RECEPCIONES ──
async function cargarRecepciones(){
  try{
    const snap=await colRec.get();
    recCache=snap.docs.map(d=>({id:d.id,...d.data()}));
    recCache.sort((a,b)=>(b.fechaEntrada||'').localeCompare(a.fechaEntrada||''));
    renderRec();
  }catch(e){ console.log('Error recepciones',e); }
}

function renderRec(){
  const tbody=document.getElementById('recTablaBody');
  const q=document.getElementById('buscarRec').value.toLowerCase();
  const cat=document.getElementById('filtrocat').value;
  const f=recCache.filter(r=>
    (!q||(r.lote||'').toLowerCase().includes(q)||(r.material||'').toLowerCase().includes(q)||(r.proveedor||'').toLowerCase().includes(q))
    &&(!cat||r.categoria===cat)
  );
  if(!f.length){ tbody.innerHTML='<tr><td colspan="9" style="text-align:center;padding:20px;color:#aaa">Sin recepciones.</td></tr>'; return; }
  tbody.innerHTML=f.map(r=>`<tr>
    <td>${fechaES(r.fechaEntrada?.split('T')[0]||r.fechaEntrada)}</td>
    <td>${r.proveedor||'—'}</td>
    <td style="font-weight:600">${r.material||'—'}</td>
    <td style="font-family:monospace;font-size:12px">${r.lote||'—'}</td>
    <td>${r.cantidad||'—'}</td>
    <td>${r.albaran||'—'}</td>
    <td><span style="padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700;background:${r.controlVisual==='OK'?'#d1f5e0':'#fdecea'};color:${r.controlVisual==='OK'?'#1a7a40':'#e74c3c'}">${r.controlVisual||'OK'}</span></td>
    <td>${r.operario||'—'}</td>
    <td style="white-space:nowrap">
      <button class="btn-edit" onclick="abrirRecepcion('${r.id}')">✏️</button>
      <button class="btn-danger" onclick="eliminarRec('${r.id}')">🗑️</button>
    </td>
  </tr>`).join('');
}
function filtrarRec(){ renderRec(); }

// ── MODAL RECEPCIÓN ──
function abrirRecepcion(id){
  const rec = id ? recCache.find(r=>r.id===id) : null;
  document.getElementById('recEditId').value = id||'';
  document.getElementById('modalRecTitulo').textContent = id ? '✏️ Editar Recepción' : '📥 Nueva Recepción';
  document.getElementById('rFecha').value = rec?.fechaEntrada||new Date().toISOString().split('T')[0];
  document.getElementById('rOperario').value = rec?.operario||'TINO';
  document.getElementById('rCategoria').value = rec?.categoria||'FIBRAS';
  document.getElementById('rProveedor').value = rec?.proveedor||'CO';
  document.getElementById('rMaterial').value = rec?.material||'';
  document.getElementById('rLote').value = rec?.lote||'';
  document.getElementById('rCantidad').value = rec?.cantidad||'';

  document.getElementById('rAlbaran').value = rec?.albaran||'';
  document.getElementById('rControl').value = rec?.controlVisual||'OK';
  document.getElementById('rObs').value = rec?.obs||'';
  document.getElementById('modalRec').classList.add('activo');
}

function generarLote(){
  const editId=document.getElementById('recEditId').value;
  if(editId) return; // No regenerar en edición
  const prov=document.getElementById('rProveedor').value;
  const fecha=document.getElementById('rFecha').value;
  const mat=document.getElementById('rMaterial').value.trim().toUpperCase().replace(/\s+/g,'-');
  if(!fecha||!mat) return;
  const p=fecha.split('-');
  document.getElementById('rLote').value=`${prov}-${p[2]}${p[1]}${p[0].slice(2)}-${mat}`;

async function confirmarRec(){
  const editId=document.getElementById('recEditId').value;
  const lote=document.getElementById('rLote').value.trim().toUpperCase();
  const mat=document.getElementById('rMaterial').value.trim().toUpperCase();
  const cat=document.getElementById('rCategoria').value;
  if(!lote||!mat){ toast('❌ Lote y material obligatorios','err'); return; }
  const datos={
    lote,material:mat,categoria:cat,
    proveedor:document.getElementById('rProveedor').value,
    fechaEntrada:document.getElementById('rFecha').value,
    operario:document.getElementById('rOperario').value,
    cantidad:document.getElementById('rCantidad').value,
    albaran:document.getElementById('rAlbaran').value,
    controlVisual:document.getElementById('rControl').value,
    obs:document.getElementById('rObs').value,
  };
  try{
    if(editId){
      // Editar
      await colRec.doc(editId).update(datos);
      // Actualizar en lotes si existe (sin where para evitar índice)
      const todoLotes=await colLotes.get();
      const loteDoc=todoLotes.docs.find(d=>d.data().lote===lote);
      if(loteDoc) await colLotes.doc(loteDoc.id).update(datos);
      toast('✅ Recepción actualizada','ok');
    } else {
      // Nueva
      datos.estado='almacen';
      datos.createdAt=new Date().toISOString();
      await colRec.add(datos);
      const enUso=lotesCache.filter(l=>l.material===mat&&l.estado==='en_uso');
      await colLotes.add({...datos,estado:enUso.length?'almacen':'en_uso'});
      toast('✅ Recepción registrada','ok');
    }
    cerrarModal('modalRec');
    cargarLotes(); cargarRecepciones();
  }catch(e){ toast('❌ '+e.message,'err'); }
}

async function eliminarRec(id){
  if(!confirm('¿Eliminar esta recepción del historial?')) return;
  try{
    await colRec.doc(id).delete();
    toast('✅ Eliminada','ok'); cargarRecepciones();
  }catch(e){ toast('❌ '+e.message,'err'); }
}

// ── SEMANA ──
async function cargarSemana(){
  const num=document.getElementById('semNum').value;
  if(!num){ toast('⚠️ Introduce número de semana','err'); return; }
  const cont=document.getElementById('semana-container');
  cont.innerHTML='<div class="empty-state"><div class="icon">⏳</div><p>Cargando…</p></div>';
  try{
    const snap=await colLotes.get();
    const enUso={};
    snap.docs.forEach(d=>{
      const l=d.data();
      if(l.estado==='agotado') return;
      if(!enUso[l.material]) enUso[l.material]={enUso:[],almacen:[]};
      enUso[l.material][l.estado==='en_uso'?'enUso':'almacen'].push(l.lote);
    });
    const semSnap=await colSem.get();
    const semDocs=semSnap.docs.filter(d=>d.data().semana===parseInt(num));
    const semData=semDocs.length?semDocs[0].data():{};
    semId=semDocs.length?semDocs[0].id:null;
    const mats=Object.keys(enUso).sort();
    semMaterias=mats;
    if(!mats.length){ cont.innerHTML='<div class="empty-state"><div class="icon">📭</div><p>Sin materias en inventario.</p></div>'; return; }
    cont.innerHTML=`
      <div style="font-size:12px;color:#7f8c8d;margin-bottom:10px;">Lotes en uso automáticos — edita si hay cambios:</div>
      ${mats.map(mat=>{
        const loteAuto=enUso[mat]?.enUso[0]||'';
        const loteGuardado=semData.materias?.[mat]||loteAuto;
        const id='sem-'+mat.replace(/[^a-zA-Z0-9]/g,'_');
        return `<div style="background:#fff;border-radius:10px;padding:12px 16px;margin-bottom:8px;box-shadow:0 2px 6px rgba(0,0,0,.05);display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
          <div style="font-weight:700;color:#1e2a44;min-width:130px;font-size:13px">${mat}</div>
          <input type="text" id="${id}" value="${loteGuardado}" placeholder="Lote en uso"
            style="flex:1;min-width:180px;padding:8px 12px;border:1px solid #dde3ee;border-radius:8px;font-family:monospace;font-size:12px;">
        </div>`;
      }).join('')}`;
  }catch(e){ cont.innerHTML='<div class="empty-state"><div class="icon">❌</div><p>Error: '+e.message+'</p></div>'; }
}

async function guardarSemana(){
  const num=parseInt(document.getElementById('semNum').value);
  if(!num||!semMaterias.length){ toast('⚠️ Carga primero una semana','err'); return; }
  const materias={};
  semMaterias.forEach(mat=>{
    const el=document.getElementById('sem-'+mat.replace(/[^a-zA-Z0-9]/g,'_'));
    if(el) materias[mat]=el.value.trim();
  });
  const datos={semana:num,periodo:document.getElementById('semPeriodo').value,materias,updatedAt:new Date().toISOString()};
  try{
    if(semId) await colSem.doc(semId).update(datos);
    else{ datos.createdAt=new Date().toISOString(); await colSem.add(datos); }
    toast('✅ Semana guardada','ok');
  }catch(e){ toast('❌ '+e.message,'err'); }
}

// ── IMPRIMIR ALMACÉN ──
async function imprimirAlmacen(){
  const snap=await colLotes.get();
  const lotes=snap.docs.map(d=>d.data()).filter(l=>l.estado!=='agotado');

  const ORDEN_FIBRAS=['ALG-30','ALG-50','ALG-22','RAYÓN 600','RAYÓN 450','RAYÓN 1200','PAPEL BLANCO','PAPEL MARRON'];
  const grupos={FIBRAS:{},PORTAMECHAS:{},PARAFINA:{},COLORANTE:{},OTROS:{}};

  lotes.forEach(l=>{
    const mat=l.material||'—';
    const cat=(l.categoria||'OTROS').toUpperCase();
    const g=grupos[cat]||grupos.OTROS;
    if(!g[mat]) g[mat]={enUso:[],almacen:[]};
    g[mat][l.estado==='en_uso'?'enUso':'almacen'].push(l);
  });

  const buildFila=(mat,ls)=>{
    const enUso=ls.enUso[0];
    const almLotes=ls.almacen;
    const almStr=almLotes.map(l=>`${l.cantidad?l.cantidad+' ':''}`+l.lote).join('<br>');
    const sig=ls.almacen[0]?.lote||'';
    return `<tr>
      <td style="padding:4px 8px;border:1px solid #aaa;font-weight:600;font-size:10px">${mat}</td>
      <td style="padding:4px 8px;border:1px solid #aaa;text-align:center;font-size:9px">${enUso?.cantidad||''}</td>
      <td style="padding:4px 8px;border:1px solid #aaa;font-family:monospace;font-size:9px">${almStr||'—'}</td>
      <td style="padding:4px 8px;border:1px solid #aaa;font-family:monospace;font-size:10px;font-weight:700">${enUso?.lote||'—'}</td>
      <td style="padding:4px 8px;border:1px solid #aaa;font-family:monospace;font-size:9px">${sig}</td>
    </tr>`;
  };

  const sep=(titulo)=>`<tr><td colspan="5" style="padding:4px 8px;background:#1e2a44;color:#fff;font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;border:1px solid #1e2a44">${titulo}</td></tr>`;

  // FIBRAS en orden fijo
  const fibrasMats=[
    ...ORDEN_FIBRAS.filter(m=>grupos.FIBRAS[m]),
    ...Object.keys(grupos.FIBRAS).filter(m=>!ORDEN_FIBRAS.includes(m)).sort()
  ];

  let filas = '';
  if(fibrasMats.length) filas += sep('FIBRAS') + fibrasMats.map(m=>buildFila(m,grupos.FIBRAS[m])).join('');
  if(Object.keys(grupos.PORTAMECHAS).length) filas += sep('PORTAMECHAS') + Object.keys(grupos.PORTAMECHAS).sort().map(m=>buildFila(m,grupos.PORTAMECHAS[m])).join('');
  if(Object.keys(grupos.PARAFINA).length) filas += sep('PARAFINA') + Object.keys(grupos.PARAFINA).sort().map(m=>buildFila(m,grupos.PARAFINA[m])).join('');
  if(Object.keys(grupos.COLORANTE).length) filas += sep('COLORANTE') + Object.keys(grupos.COLORANTE).sort().map(m=>buildFila(m,grupos.COLORANTE[m])).join('');
  if(Object.keys(grupos.OTROS).length) filas += sep('OTROS') + Object.keys(grupos.OTROS).sort().map(m=>buildFila(m,grupos.OTROS[m])).join('');

  document.getElementById('print-area').innerHTML=`
    <style>@page{margin:8mm;size:A4 portrait;}</style>
    <div style="font-family:Arial,sans-serif;font-size:10px;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5mm;border-bottom:2px solid #000;padding-bottom:3mm;">
        <div>
          <div style="font-size:14px;font-weight:bold">ALMACEN VICENTE ESPI, S.L.</div>
          <div style="font-size:10px;color:#555">${fechaES(new Date().toISOString().split('T')[0])}</div>
        </div>
        <img src="logo-vespi.jpg" style="height:14mm;width:auto">
      </div>
      <table style="width:100%;border-collapse:collapse;">
        <thead><tr>
          <th style="padding:5px 8px;border:1px solid #aaa;background:#ddd;text-align:left;font-size:9px">MATERIA PRIMA</th>
          <th style="padding:5px 8px;border:1px solid #aaa;background:#ddd;font-size:9px">P</th>
          <th style="padding:5px 8px;border:1px solid #aaa;background:#ddd;text-align:left;font-size:9px">LOTE ALMACÉN</th>
          <th style="padding:5px 8px;border:1px solid #aaa;background:#ddd;text-align:left;font-size:9px">LOTE EN USO</th>
          <th style="padding:5px 8px;border:1px solid #aaa;background:#ddd;text-align:left;font-size:9px">SIGUIENTE LOTE</th>
        </tr></thead>
        <tbody>${filas}</tbody>
      </table>
    </div>`;
  setTimeout(()=>{ window.print(); setTimeout(()=>{ document.getElementById('print-area').innerHTML=''; },1500); },200);
}

// ── HELPERS ──
function cerrarModal(id){ document.getElementById(id).classList.remove('activo'); }
function fechaES(iso){
  if(!iso) return '';
  const p=iso.split('-');
  if(p.length!==3) return iso;
  return p[2]+'/'+p[1]+'/'+p[0];
}
function getSemana(){
  const now=new Date(),start=new Date(now.getFullYear(),0,1);
  return Math.ceil(((now-start)/86400000+start.getDay()+1)/7);
}
function getPeriodo(){
  const hoy=new Date(),dia=hoy.getDay()===0?6:hoy.getDay()-1;
  const lun=new Date(hoy); lun.setDate(hoy.getDate()-dia);
  const dom=new Date(lun); dom.setDate(lun.getDate()+6);
  const fmt=d=>String(d.getDate()).padStart(2,'0')+'/'+String(d.getMonth()+1).padStart(2,'0');
  return 'DEL '+fmt(lun)+' AL '+fmt(dom);
}
function toast(msg,tipo=''){
  const el=document.getElementById('toast');
  el.textContent=msg; el.className='toast '+(tipo==='ok'?'ok':tipo==='err'?'err':'');
  el.classList.add('show'); setTimeout(()=>el.classList.remove('show'),3500);
}
</script>
