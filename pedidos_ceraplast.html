        oninput="parsear()"></textarea>

<script>
let db, colPedidos, colProd;
let lineas = [];
const COLOR_BADGE = {'ROJO':'#e74c3c','NATURAL':'#7f8c8d','VERDE':'#27ae60','AZUL':'#2980b9','AMARILLO':'#f39c12','VIOLETA':'#8e44ad'};

firebase.auth().onAuthStateChanged(u=>{
  if(!u){ location.href='index.html'; return; }
  db = firebase.firestore();
  colPedidos = db.collection('pedidos_ceraplast');
  colProd = db.collection('produccion_ceraplast2');
  cargarPedidos();
});

// ══════════════════════════════
// CARGAR PEDIDOS
// ══════════════════════════════
async function cargarPedidos(){
  const cont = document.getElementById('pedidosContainer');
  cont.innerHTML = '<div class="empty-state"><div class="icon">⏳</div><p>Cargando…</p></div>';
  const filtro = document.getElementById('filtroEstado').value;
  try{
    const snap = await colPedidos.get();
    let docs = snap.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>(b.createdAt||'').localeCompare(a.createdAt||''));
    if(filtro) docs = docs.filter(d=>d.estado===filtro);
    if(!docs.length){ cont.innerHTML='<div class="empty-state"><div class="icon">📭</div><p>Sin pedidos.</p></div>'; return; }
    cont.innerHTML = docs.map(p=>{
      const lineasHTML = (p.lineas||[]).map(l=>`
        <div class="linea-pedido">
          <span class="linea-ref">${l.ref}</span>
          ${l.caja?`<span style="background:#e8ecf1;padding:1px 6px;border-radius:5px;font-size:11px">${l.caja}</span>`:''}
          ${l.cliente?`<span style="color:#555">${l.cliente}</span>`:''}
          ${l.rojo||l.natural?`<span style="color:#e74c3c;font-weight:600">${l.rojo||0}R+${l.natural||0}N</span>`:''}
          ${l.cantidadColor&&l.color?`<span style="color:#8e44ad;font-weight:600">${l.cantidadColor} ${l.color}</span>`:''}
          ${l.maquina?`<span class="linea-maq">${l.maquina}</span>`:`<span class="linea-maq sin">Sin máquina</span>`}
        </div>`).join('');
      return `<div class="pedido-card ${p.estado||'pendiente'}">
        <div class="pedido-header" onclick="toggleBody('body-${p.id}')">
          <div>
            <div class="pedido-cliente">${p.cliente}</div>
            <div class="pedido-fecha">${fechaES(p.fecha)} ${p.obs?'· '+p.obs:''}</div>
          </div>
          <span class="badge ${p.estado||'pendiente'}">${
            p.estado==='finalizado'?'✅ Finalizado':
            p.estado==='en_produccion'?'🏭 En producción':'⏳ Pendiente'
          }</span>
        </div>
        <div class="pedido-body" id="body-${p.id}" style="display:none;">
          <div style="margin:8px 0;">${lineasHTML}</div>
          <div style="display:flex;gap:8px;margin-top:8px;flex-wrap:wrap;">
            <button class="btn-sm" style="background:#e8f4fd;color:#00a9e0;" onclick="abrirEditar('${p.id}')">✏️ Editar</button>
            ${p.estado!=='finalizado'?`<button class="btn-sm" style="background:#d1f5e0;color:#1a7a40;" onclick="marcarFinalizado('${p.id}')">✅ Finalizar</button>`:''}
            <button class="btn-sm" style="background:#f39c12;color:#fff;" onclick="imprimirPedido('${p.id}')">🖨️ Imprimir</button>
            <button class="btn-sm btn-red" onclick="eliminarPedido('${p.id}')">🗑️ Eliminar</button>
          </div>
        </div>
      </div>`;
    }).join('');
  }catch(e){ cont.innerHTML='<div class="empty-state"><div class="icon">❌</div><p>Error cargando.</p></div>'; }
}

function toggleBody(id){
  const el=document.getElementById(id);
  if(el) el.style.display=el.style.display==='none'?'':'none';
}

// ══════════════════════════════
// NUEVO / EDITAR
// ══════════════════════════════
function abrirNuevo(){
  lineas=[];
  document.getElementById('pedidoId').value='';
  document.getElementById('modalTitulo').textContent='＋ Nuevo Pedido';
  document.getElementById('pedCliente').value='';
  document.getElementById('pedFecha').value=new Date().toISOString().split('T')[0];
  document.getElementById('pedObs').value='';
  document.getElementById('pedTexto').value='';
  document.getElementById('lineasWrap').style.display='none';
  document.getElementById('lineasGen').innerHTML='';
  document.getElementById('modalPedido').classList.add('activo');
}

async function abrirEditar(id){
  const doc = await colPedidos.doc(id).get();
  const p = {id:doc.id,...doc.data()};
  lineas = [...(p.lineas||[])];
  document.getElementById('pedidoId').value=id;
  document.getElementById('modalTitulo').textContent='✏️ Editar Pedido';
  document.getElementById('pedCliente').value=p.cliente||'';
  document.getElementById('pedFecha').value=p.fecha||'';
  document.getElementById('pedObs').value=p.obs||'';
  // Reconstruir texto desde líneas
  const texto = lineas.map(l=>{
    let t=l.ref;
    if(l.caja) t+=' '+l.caja;
    if(l.cliente) t+=' '+l.cliente;
    if(l.palets&&l.color==='ROJO') t+=' = '+l.palets+'+0';
    else if(l.palets&&l.color==='NATURAL') t+=' = 0+'+l.palets;
    else if(l.palets&&l.color) t+=' '+l.palets+' '+l.color;
    return t;
  }).join('\n');
  document.getElementById('pedTexto').value=texto;
  renderLineas();
  document.getElementById('modalPedido').classList.add('activo');
}

// ══════════════════════════════
// PARSER
// ══════════════════════════════
function parsear(){
  const texto = document.getElementById('pedTexto').value;
  lineas = [];

  const COLORES_MAP = {
    'ROJO':'ROJO','ROJOS':'ROJO',
    'NATURAL':'NATURAL','NATURALES':'NATURAL','NT':'NATURAL',
    'VERDE':'VERDE','VERDES':'VERDE',
    'AZUL':'AZUL','AZULES':'AZUL',
    'AMARILLO':'AMARILLO','AMARILLOS':'AMARILLO',
    'VIOLETA':'VIOLETA','VIOLETAS':'VIOLETA'
  };

  texto.split('\n').map(l=>l.trim()).filter(l=>l).forEach(linea=>{
    const palabras = linea.split(/\s+/);
    const ref = palabras[0].toUpperCase();

    // Detectar si hay = R+N al final
    const matchRN = linea.match(/=\s*(\d+)\s*\+\s*(\d+)/);
    // Detectar si hay N COLOR al final (ej: 2 AZULES, 1 VERDE)
    const matchColor = linea.match(/(\d+)\s+([A-ZÁÉÍÓÚÑ]+)\s*$/i);

    // Extraer caja y cliente del medio
    // Formato: REF [CAJA...] [CLIENTE] = R+N
    // o:       REF [CAJA...] [CLIENTE] N COLOR
    let resto = linea.replace(/^\S+\s+/, ''); // quitar ref
    let caja = '', cliente = '';

    if(matchRN){
      // Quitar el = R+N del final
      resto = resto.replace(/=\s*\d+\s*\+\s*\d+/, '').trim();
      const partes = resto.split(/\s+/).filter(Boolean);
      if(partes.length >= 2){ cliente = partes[partes.length-1]; caja = partes.slice(0,-1).join(' '); }
      else if(partes.length === 1){ caja = partes[0]; }

      const rojo = parseInt(matchRN[1])||0;
      const natural = parseInt(matchRN[2])||0;
      // Generar línea ROJO si rojo > 0
      if(rojo > 0) lineas.push({ref, caja:caja.toUpperCase(), cliente:cliente.toUpperCase(), color:'ROJO', palets:rojo, maquina:''});
      // Generar línea NATURAL si natural > 0
      if(natural > 0) lineas.push({ref, caja:caja.toUpperCase(), cliente:cliente.toUpperCase(), color:'NATURAL', palets:natural, maquina:''});

    } else if(matchColor){
      const colorRaw = matchColor[2].toUpperCase();
      const color = COLORES_MAP[colorRaw] || colorRaw;
      const palets = parseInt(matchColor[1])||1;
      // Quitar cantidad+color del final
      resto = resto.replace(/(\d+)\s+[A-ZÁÉÍÓÚÑ]+\s*$/i, '').trim();
      const partes = resto.split(/\s+/).filter(Boolean);
      if(partes.length >= 2){ cliente = partes[partes.length-1]; caja = partes.slice(0,-1).join(' '); }
      else if(partes.length === 1){ caja = partes[0]; }
      lineas.push({ref, caja:caja.toUpperCase(), cliente:cliente.toUpperCase(), color, palets, maquina:''});

    } else {
      // Línea libre
      lineas.push({ref, caja:'', cliente:'', color:'', palets:0, maquina:''});
    }
  });
  renderLineas();
}

const MAQUINAS=['M1','M2','M3','M4','M5','M6','M7'];

const COLOR_BADGE = {
  'ROJO':'#e74c3c','NATURAL':'#7f8c8d','VERDE':'#27ae60',
  'AZUL':'#2980b9','AMARILLO':'#f39c12','VIOLETA':'#8e44ad'
};

function renderLineas(){
  const wrap = document.getElementById('lineasWrap');
  const cont = document.getElementById('lineasGen');
  if(!lineas.length){ wrap.style.display='none'; return; }
  wrap.style.display='';
  cont.innerHTML = lineas.map((l,i)=>{
    const colorStyle = COLOR_BADGE[l.color]||'#555';
    return `<div class="linea-gen">
      <div class="linea-gen-top">
        <span class="linea-gen-ref">${l.ref}</span>
        ${l.caja?`<span class="linea-gen-caja">${l.caja}</span>`:''}
        ${l.cliente?`<span class="linea-gen-cliente">${l.cliente}</span>`:''}
        ${l.color?`<span style="background:${colorStyle};color:#fff;padding:2px 10px;border-radius:12px;font-size:12px;font-weight:700">${l.color}</span>`:''}
        ${l.palets?`<span class="linea-gen-cant">${l.palets} palet${l.palets>1?'s':''}</span>`:''}
        <button onclick="lineas.splice(${i},1);renderLineas();" style="background:none;border:none;color:#e74c3c;font-size:16px;cursor:pointer;margin-left:auto;">×</button>
      </div>
      <div class="maq-grid">
        ${MAQUINAS.map(m=>`<button class="maq-btn ${l.maquina===m?'sel':''}"
          onclick="lineas[${i}].maquina='${m}';renderLineas();">${m}</button>`).join('')}
        <button class="maq-btn ${!l.maquina?'sel':''}"
          onclick="lineas[${i}].maquina='';renderLineas();" style="color:#aaa;">—</button>
      </div>
    </div>`;
  }).join('');
}

// ══════════════════════════════
// GUARDAR
// ══════════════════════════════
async function guardarPedido(){
  const cliente=document.getElementById('pedCliente').value.trim();
  if(!cliente){ toast('❌ Cliente obligatorio','err'); return; }
  const id=document.getElementById('pedidoId').value;
  const datos={
    cliente, fecha:document.getElementById('pedFecha').value,
    obs:document.getElementById('pedObs').value.trim(),
    lineas, updatedAt:new Date().toISOString()
  };
  try{
    if(id){
      await colPedidos.doc(id).update(datos);
    } else {
      datos.estado='pendiente'; datos.createdAt=new Date().toISOString();
      await colPedidos.add(datos);
    }
    toast('✅ Pedido guardado','ok');
    cerrarModal('modalPedido');
    cargarPedidos();
  }catch(e){ toast('❌ '+e.message,'err'); }
}

async function guardarYProduccion(){
  const cliente=document.getElementById('pedCliente').value.trim();
  if(!cliente){ toast('❌ Cliente obligatorio','err'); return; }
  const lineasConMaq = lineas.filter(l=>l.maquina);
  if(!lineasConMaq.length){ toast('⚠️ Asigna al menos una máquina','err'); return; }

  const id=document.getElementById('pedidoId').value;
  const datos={
    cliente, fecha:document.getElementById('pedFecha').value,
    obs:document.getElementById('pedObs').value.trim(),
    lineas, estado:'en_produccion', updatedAt:new Date().toISOString()
  };
  try{
    // Guardar/actualizar pedido
    let pedidoId = id;
    if(id){
      await colPedidos.doc(id).update(datos);
    } else {
      datos.createdAt=new Date().toISOString();
      const ref=await colPedidos.add(datos);
      pedidoId=ref.id;
    }

    // Añadir a producción
    const prodSnap=await colProd.orderBy('createdAt','desc').limit(1).get();
    let prodData={fecha:new Date().toISOString().split('T')[0],maquinas:{},createdAt:new Date().toISOString()};
    let prodId=null;
    if(!prodSnap.empty){ prodId=prodSnap.docs[0].id; prodData={...prodSnap.docs[0].data()}; }
    MAQUINAS.forEach(m=>{ if(!prodData.maquinas[m]) prodData.maquinas[m]={lineas:[],nota:''}; });

    lineasConMaq.forEach(l=>{
      prodData.maquinas[l.maquina].lineas.push({
        ref:l.ref, color:l.color||'', cliente:l.cliente||cliente,
        palets:l.palets||0, cajas:0, uds:0, casillas:[], caja:l.caja||''
      });
    });

    if(prodId) await colProd.doc(prodId).update({maquinas:prodData.maquinas,updatedAt:new Date().toISOString()});
    else await colProd.add(prodData);

    toast('✅ Guardado y enviado a producción','ok');
    cerrarModal('modalPedido');
    cargarPedidos();
  }catch(e){ toast('❌ '+e.message,'err'); }
}

// ══════════════════════════════
// ACCIONES
// ══════════════════════════════
async function marcarFinalizado(id){
  if(!confirm('¿Marcar como finalizado?')) return;
  try{
    await colPedidos.doc(id).update({estado:'finalizado',updatedAt:new Date().toISOString()});
    toast('✅ Finalizado','ok'); cargarPedidos();
  }catch(e){ toast('❌ '+e.message,'err'); }
}

async function eliminarPedido(id){
  if(!confirm('¿Eliminar este pedido?')) return;
  try{
    await colPedidos.doc(id).delete();
    toast('✅ Eliminado','ok'); cargarPedidos();
  }catch(e){ toast('❌ '+e.message,'err'); }
}

async function imprimirPedido(id){
  const doc=await colPedidos.doc(id).get();
  const p={id:doc.id,...doc.data()};
  const filasHTML=(p.lineas||[]).map(l=>`<tr>
    <td style="padding:6px 10px;border:1px solid #aaa;font-weight:600">${l.ref}</td>
    <td style="padding:6px 10px;border:1px solid #aaa">${l.caja||''}</td>
    <td style="padding:6px 10px;border:1px solid #aaa">${l.cliente||''}</td>
    <td style="padding:6px 10px;border:1px solid #aaa;text-align:center">${l.rojo||l.cantidadColor||''}</td>
    <td style="padding:6px 10px;border:1px solid #aaa;text-align:center">${l.natural||''}</td>
    <td style="padding:6px 10px;border:1px solid #aaa;text-align:center">${l.color||''}</td>
    <td style="padding:6px 10px;border:1px solid #aaa;text-align:center">${l.maquina||'—'}</td>
  </tr>`).join('');
  document.getElementById('print-area').innerHTML=`
    <style>@page{margin:10mm;size:A4 portrait;}</style>
    <div style="font-family:Arial,sans-serif;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6mm;border-bottom:2px solid #000;padding-bottom:4mm;">
        <div><div style="font-size:18px;font-weight:bold">PEDIDO — ${p.cliente}</div>
        <div style="font-size:11px;color:#555">${fechaES(p.fecha)}${p.obs?' · '+p.obs:''}</div></div>
        <img src="logo-ceraplast.png" style="height:16mm;width:auto;">
      </div>
      <table style="width:100%;border-collapse:collapse;font-size:11px;">
        <thead><tr>
          <th style="padding:6px 10px;border:1px solid #aaa;background:#e0e0e0;text-align:left">Ref</th>
          <th style="padding:6px 10px;border:1px solid #aaa;background:#e0e0e0;text-align:left">Caja</th>
          <th style="padding:6px 10px;border:1px solid #aaa;background:#e0e0e0;text-align:left">Cliente</th>
          <th style="padding:6px 10px;border:1px solid #aaa;background:#e0e0e0;text-align:center">Rojo</th>
          <th style="padding:6px 10px;border:1px solid #aaa;background:#e0e0e0;text-align:center">Natural</th>
          <th style="padding:6px 10px;border:1px solid #aaa;background:#e0e0e0;text-align:center">Color</th>
          <th style="padding:6px 10px;border:1px solid #aaa;background:#e0e0e0;text-align:center">Máquina</th>
        </tr></thead>
        <tbody>${filasHTML}</tbody>
      </table>
    </div>`;
  setTimeout(()=>{ window.print(); setTimeout(()=>{ document.getElementById('print-area').innerHTML=''; },1500); },200);
}

// ══════════════════════════════
// HELPERS
// ══════════════════════════════
function cerrarModal(id){ document.getElementById(id).classList.remove('activo'); }
function fechaES(iso){
  if(!iso) return '';
  const p=iso.split('-');
  if(p.length!==3) return iso;
  return p[2]+'/'+p[1]+'/'+p[0];
}
function toast(msg,tipo=''){
  const el=document.getElementById('toast');
  el.textContent=msg; el.className='toast '+(tipo==='ok'?'ok':tipo==='err'?'err':'');
  el.classList.add('show'); setTimeout(()=>el.classList.remove('show'),3500);
}
</script>
