<div class="container">

    <button onclick="abrirNuevo()" style="background:#00a9e0;color:#fff;border:none;padding:12px 20px;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer;box-shadow:0 3px 10px rgba(0,169,224,.3);">＋ Nuevo Pedido</button>

<!-- MODAL ENVIAR A PRODUCCIÓN -->

<script>
let db, colPedidos, colProd;
let pedidoActual = null;
let lineas = [];
let asignaciones = {}; // {lineaIdx: maquina}

firebase.auth().onAuthStateChanged(u=>{
  if(!u){ location.href='index.html'; return; }
  db = firebase.firestore();
  colPedidos = db.collection('pedidos_ceraplast');
  colProd = db.collection('produccion_ceraplast2');
  cargarPedidos();
});

// ══════════════════════════════
// CARGAR PEDIDOS
// ══════════════════════════════
async function cargarPedidos(){
  const cont = document.getElementById('pedidosContainer');
  cont.innerHTML = '<div class="empty-state"><div class="icon">⏳</div><p>Cargando…</p></div>';
  const filtro = document.getElementById('filtroEstado').value;
  try{
    let q = colPedidos.orderBy('fecha','desc');
    if(filtro) q = colPedidos.where('estado','==',filtro).orderBy('fecha','desc');
    const snap = await q.get();
    if(snap.empty){ cont.innerHTML='<div class="empty-state"><div class="icon">📭</div><p>Sin pedidos.</p></div>'; return; }
    cont.innerHTML = snap.docs.map(d=>{
      const p = {id:d.id,...d.data()};
      const lineasHTML = (p.lineas||[]).map((l,i)=>`
        <div class="linea-pedido">
          <span class="linea-ref">${l.ref}</span>
          ${l.caja?`<span style="font-size:11px;background:#e8ecf1;padding:1px 6px;border-radius:5px">${l.caja}</span>`:''}
          ${l.cliente?`<span style="font-size:12px;color:#555">${l.cliente}</span>`:''}
          ${l.color?`<span style="font-size:11px;font-weight:700;color:${COLOR_BADGE[l.color]||'#555'}">${l.color}</span>`:''}
          ${l.palets?`<span style="font-size:12px;font-weight:600">${l.palets} palets</span>`:''}
          ${l.maquina?`<span class="linea-maq">${l.maquina}</span>`:`<span class="linea-maq sin">Sin máquina</span>`}
        </div>`).join('');
      return `<div class="pedido-card ${p.estado||'pendiente'}">
        <div class="pedido-header" onclick="togglePedido('body-${p.id}')">
          <div>
            <div class="pedido-cliente">${p.numero?'<span style="font-size:11px;color:#aaa;margin-right:6px">'+p.numero+'</span>':''}${p.cliente}</div>
            <div class="pedido-fecha">${fechaES(p.fecha)} ${p.obs?'· '+p.obs:''}</div>
          </div>
          <span class="badge ${p.estado||'pendiente'}">${p.estado==='finalizado'?'✅ Finalizado':p.estado==='en_produccion'?'🏭 En producción':'⏳ Pendiente'}</span>
        </div>
        <div class="pedido-body" id="body-${p.id}" style="display:none;">
          ${lineasHTML}
          <div style="display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;">
            <button class="btn-sm" style="background:#e8f4fd;color:#00a9e0;" onclick="abrirEditar('${p.id}')">✏️ Editar</button>
            <button class="btn-sm" style="background:#e8f7ed;color:#27ae60;" onclick="abrirProduccion('${p.id}')">🏭 → Producción</button>
            ${p.estado!=='finalizado'?`<button class="btn-sm" style="background:#d1f5e0;color:#1a7a40;" onclick="marcarFinalizado('${p.id}')">✅ Finalizar</button>`:''}
            <button class="btn-sm" style="background:#f39c12;color:#fff;" onclick="imprimirPedido('${p.id}')">🖨️ Imprimir</button>
            <button class="btn-sm" style="background:#fdecea;color:#e74c3c;" onclick="duplicarPedido('${p.id}')">📋 Duplicar</button>
            <button class="btn-sm" style="background:#fdecea;color:#e74c3c;" onclick="eliminarPedido('${p.id}')">🗑️ Eliminar</button>
          </div>
        </div>
      </div>`;
    }).join('');
  }catch(e){ cont.innerHTML='<div class="empty-state"><div class="icon">❌</div><p>Error: '+e.message+'</p></div>'; }
}

function togglePedido(id){
  const el=document.getElementById(id);
  if(el) el.style.display=el.style.display==='none'?'':'none';
}

// ══════════════════════════════
// NUEVO / EDITAR PEDIDO
// ══════════════════════════════
function abrirNuevo(){
  pedidoActual=null; lineas=[];
  const tl=document.getElementById('pedTextoLibre'); if(tl) tl.value='';
  document.getElementById('pedidoId').value='';
  document.getElementById('modalTitulo').textContent='＋ Nuevo Pedido';
  document.getElementById('pedCliente').value='';
  document.getElementById('pedFecha').value=new Date().toISOString().split('T')[0];
  document.getElementById('pedObs').value='';
  renderLineas();
  document.getElementById('modalPedido').classList.add('activo');
}

async function abrirEditar(id){
  const doc = await colPedidos.doc(id).get();
  const p = {id:doc.id,...doc.data()};
  pedidoActual=id; lineas=[...(p.lineas||[])];
  document.getElementById('pedidoId').value=id;
  document.getElementById('modalTitulo').textContent='✏️ Editar Pedido';
  document.getElementById('pedCliente').value=p.cliente||'';
  document.getElementById('pedFecha').value=p.fecha||'';
  document.getElementById('pedObs').value=p.obs||'';
  const tl=document.getElementById('pedTextoLibre');
  if(tl) tl.value=p.textoLibre||'';
  renderLineas();
  document.getElementById('modalPedido').classList.add('activo');
}

function addLinea(){
  lineas.push({ref:'',caja:'',cliente:'',color:'ROJO',palets:0,maquina:''});
  renderLineas();
}

const COLOR_BADGE={'ROJO':'#e74c3c','NATURAL':'#7f8c8d','VERDE':'#27ae60','AZUL':'#2980b9','AMARILLO':'#f39c12','VIOLETA':'#8e44ad'};
const COLORES=['ROJO','NATURAL','AMARILLO','VERDE','AZUL','VIOLETA'];

function renderLineas(){
  document.getElementById('lineasBody').innerHTML = lineas.map((l,i)=>`
    <tr>
      <td><input type="text" value="${l.ref||''}" onchange="lineas[${i}].ref=this.value.toUpperCase()" style="border:1px solid #dde3ee;border-radius:6px;padding:5px 8px;font-size:13px;width:70px;text-transform:uppercase"></td>
      <td><input type="text" value="${l.caja||''}" onchange="lineas[${i}].caja=this.value.toUpperCase()" style="border:1px solid #dde3ee;border-radius:6px;padding:5px 8px;font-size:13px;width:90px;text-transform:uppercase" placeholder="CAJA NEGRA"></td>
      <td><input type="text" value="${l.cliente||''}" onchange="lineas[${i}].cliente=this.value.toUpperCase()" style="border:1px solid #dde3ee;border-radius:6px;padding:5px 8px;font-size:13px;width:80px;text-transform:uppercase" placeholder="ADISCO"></td>
      <td>
        <select onchange="lineas[${i}].color=this.value" style="border:1px solid #dde3ee;border-radius:6px;padding:5px;font-size:13px;background:${COLOR_BADGE[l.color]||'#fff'};color:${COLOR_BADGE[l.color]?'#fff':'#000'}">
          ${COLORES.map(c=>`<option value="${c}" ${l.color===c?'selected':''}>${c}</option>`).join('')}
        </select>
      </td>
      <td><input type="number" value="${l.palets||''}" placeholder="0" onchange="lineas[${i}].palets=parseInt(this.value)||0" style="border:1px solid #dde3ee;border-radius:6px;padding:5px 8px;font-size:13px;width:55px;"></td>
      <td><button onclick="lineas.splice(${i},1);renderLineas();" style="background:none;border:none;color:#e74c3c;font-size:16px;cursor:pointer;">×</button></td>
    </tr>`).join('');
}

// ── PARSER TEXTO LIBRE ──
function parsearTextoLibre(){
  const texto = document.getElementById('pedTextoLibre').value;
  lineas = [];
  const COLORES_MAP = {'ROJO':'ROJO','ROJOS':'ROJO','NATURAL':'NATURAL','NATURALES':'NATURAL','NT':'NATURAL',
    'VERDE':'VERDE','VERDES':'VERDE','AZUL':'AZUL','AZULES':'AZUL',
    'AMARILLO':'AMARILLO','AMARILLOS':'AMARILLO','VIOLETA':'VIOLETA','VIOLETAS':'VIOLETA'};

  texto.split('\n').map(l=>l.trim()).filter(l=>l).forEach(linea=>{
    const ref = linea.split(/\s+/)[0].toUpperCase();
    const matchRN = linea.match(/=\s*(\d+)\s*\+\s*(\d+)/);
    const matchColor = linea.match(/(\d+)\s+([A-ZÁÉÍÓÚÑ]+)\s*$/i);

    let resto = linea.replace(/^\S+\s+/, '');
    let caja='', cliente='';

    if(matchRN){
      resto = resto.replace(/=\s*\d+\s*\+\s*\d+/, '').trim();
      const p = resto.split(/\s+/).filter(Boolean);
      if(p.length>=2){ cliente=p[p.length-1]; caja=p.slice(0,-1).join(' '); }
      else if(p.length===1){ caja=p[0]; }
      const rojo=parseInt(matchRN[1])||0, natural=parseInt(matchRN[2])||0;
      if(rojo>0)    lineas.push({ref, caja:caja.toUpperCase(), cliente:cliente.toUpperCase(), color:'ROJO',    palets:rojo,    maquina:''});
      if(natural>0) lineas.push({ref, caja:caja.toUpperCase(), cliente:cliente.toUpperCase(), color:'NATURAL', palets:natural, maquina:''});
    } else if(matchColor){
      const color = COLORES_MAP[matchColor[2].toUpperCase()]||matchColor[2].toUpperCase();
      const palets = parseInt(matchColor[1])||1;
      resto = resto.replace(/(\d+)\s+[A-ZÁÉÍÓÚÑ]+\s*$/i,'').trim();
      const p = resto.split(/\s+/).filter(Boolean);
      if(p.length>=2){ cliente=p[p.length-1]; caja=p.slice(0,-1).join(' '); }
      else if(p.length===1){ caja=p[0]; }
      lineas.push({ref, caja:caja.toUpperCase(), cliente:cliente.toUpperCase(), color, palets, maquina:''});
    } else {
      lineas.push({ref, caja:'', cliente:'', color:'ROJO', palets:0, maquina:''});
    }
  });
  renderLineas();
}

async function guardarPedido(){
  const cliente=document.getElementById('pedCliente').value.trim();
  if(!cliente){ toast('❌ El cliente es obligatorio','err'); return; }
  const textoLibre = document.getElementById('pedTextoLibre')?.value||'';
  const datos={
    cliente, fecha:document.getElementById('pedFecha').value,
    obs:document.getElementById('pedObs').value.trim(),
    textoLibre, lineas, estado:'pendiente', updatedAt:new Date().toISOString()
  };
  try{
    if(pedidoActual){
      await colPedidos.doc(pedidoActual).update(datos);
    } else {
      const allSnap=await colPedidos.get();
      const nums=allSnap.docs.map(d=>parseInt((d.data().numero||'CP_000').replace('CP_',''))||0);
      datos.numero='CP_'+String((nums.length?Math.max(...nums):0)+1).padStart(3,'0');
      datos.createdAt=new Date().toISOString();
      await colPedidos.add(datos);
    }
    toast('✅ Pedido guardado','ok');
    cerrarModal('modalPedido');
    cargarPedidos();
  }catch(e){ toast('❌ '+e.message,'err'); }
}

// ══════════════════════════════
// ENVIAR A PRODUCCIÓN
// ══════════════════════════════
async function abrirProduccion(id){
  const doc = await colPedidos.doc(id).get();
  const p = {id:doc.id,...doc.data()};
  pedidoActual=id; asignaciones={};
  // Pre-cargar asignaciones existentes
  (p.lineas||[]).forEach((l,i)=>{ if(l.maquina) asignaciones[i]=l.maquina; });

  const MAQUINAS=['M1','M2','M3','M4','M5','M6','M7'];
  document.getElementById('asignacionContainer').innerHTML = (p.lineas||[]).map((l,i)=>`
    <div style="background:#f9fafc;border-radius:10px;padding:12px;margin-bottom:10px;">
      <div style="font-weight:700;color:#1e2a44;margin-bottom:8px;">
        ${l.ref} ${l.color} ${l.caja||''} ${l.cliente||''} — ${l.palets||0} palets
      </div>
      <div class="maq-grid">
        ${MAQUINAS.map(m=>`
          <button class="maq-btn ${asignaciones[i]===m?'sel':''}" onclick="selMaq(${i},'${m}',this)">
            ${m}
          </button>`).join('')}
        <button class="maq-btn ${!asignaciones[i]?'sel':''}" onclick="selMaq(${i},'',this)" style="grid-column:span 1;">
          —
        </button>
      </div>
    </div>`).join('');

  document.getElementById('modalProduccion').classList.add('activo');
}

function selMaq(lineaIdx, maq, btn){
  asignaciones[lineaIdx] = maq;
  // Actualizar visual
  const grid = btn.closest('.maq-grid');
  grid.querySelectorAll('.maq-btn').forEach(b=>b.classList.remove('sel'));
  btn.classList.add('sel');
}

async function confirmarProduccion(){
  if(!pedidoActual) return;
  try{
    // 1. Actualizar maquinas en el pedido
    const doc = await colPedidos.doc(pedidoActual).get();
    const p = doc.data();
    const lineasActualizadas = (p.lineas||[]).map((l,i)=>({
      ...l, maquina: asignaciones[i]||''
    }));
    await colPedidos.doc(pedidoActual).update({
      lineas: lineasActualizadas,
      estado: 'en_produccion',
      updatedAt: new Date().toISOString()
    });

    // 2. Añadir a la orden de producción actual
    const prodSnap = await colProd.get();
    let prodId = null, prodData = null;
    const MAQUINAS=['M1','M2','M3','M4','M5','M6','M7'];
    if(!prodSnap.empty){
      const docs = prodSnap.docs.sort((a,b)=>(b.data().createdAt||'').localeCompare(a.data().createdAt||''));
      prodId = docs[0].id;
      prodData = docs[0].data();
    } else {
      prodData = { fecha: new Date().toISOString().split('T')[0], maquinas:{}, createdAt: new Date().toISOString() };
    }
    if(!prodData.maquinas) prodData.maquinas={};
    MAQUINAS.forEach(m=>{ if(!prodData.maquinas[m]) prodData.maquinas[m]={lineas:[],nota:''}; });

    // Cargar referencias para obtener uds/caja y cajas/palet
    const refsSnap = await db.collection('refs_ceraplast').get();
    const REFS = {};
    refsSnap.docs.forEach(d=>{ REFS[d.id]={...d.data()}; });

    // Añadir cada línea a su máquina
    lineasActualizadas.forEach(l=>{
      if(!l.maquina) return;
      if(!prodData.maquinas[l.maquina]) prodData.maquinas[l.maquina]={lineas:[],nota:''};
      const ref = REFS[l.ref]||{};
      prodData.maquinas[l.maquina].lineas.push({
        ref: l.ref,
        color: l.color||'',
        cliente: l.cliente||p.cliente,
        caja: l.caja||'',
        palets: l.palets||0,
        cajas: ref.cajas||0,
        uds: ref.uds||0,
        casillas: []
      });
    });

    if(prodId){
      await colProd.doc(prodId).update({ maquinas: prodData.maquinas, updatedAt: new Date().toISOString() });
    } else {
      await colProd.add(prodData);
    }

    toast('✅ Enviado a producción','ok');
    cerrarModal('modalProduccion');
    cargarPedidos();
  }catch(e){ toast('❌ '+e.message,'err'); }
}

// ══════════════════════════════
// DUPLICAR
// ══════════════════════════════
async function duplicarPedido(id){
  if(!confirm('¿Duplicar este pedido?')) return;
  try{
    const doc = await colPedidos.doc(id).get();
    const p = doc.data();
    const allSnap = await colPedidos.get();
    const nums = allSnap.docs.map(d=>parseInt((d.data().numero||'CP_000').replace('CP_',''))||0);
    const sigNum = 'CP_'+String((nums.length?Math.max(...nums):0)+1).padStart(3,'0');
    const nuevo = {...p, numero:sigNum, fecha:new Date().toISOString().split('T')[0],
      estado:'pendiente', createdAt:new Date().toISOString(), updatedAt:new Date().toISOString()};
    delete nuevo.id;
    await colPedidos.add(nuevo);
    toast('✅ Duplicado como '+sigNum,'ok');
    cargarPedidos();
  }catch(e){ toast('❌ '+e.message,'err'); }
}

// ══════════════════════════════
// ACCIONES
// ══════════════════════════════
async function marcarFinalizado(id){
  if(!confirm('¿Marcar este pedido como finalizado?')) return;
  try{
    await colPedidos.doc(id).update({estado:'finalizado',updatedAt:new Date().toISOString()});
    toast('✅ Pedido finalizado','ok'); cargarPedidos();
  }catch(e){ toast('❌ '+e.message,'err'); }
}

async function eliminarPedido(id){
  if(!confirm('¿Eliminar este pedido?')) return;
  try{
    await colPedidos.doc(id).delete();
    toast('✅ Eliminado','ok'); cargarPedidos();
  }catch(e){ toast('❌ '+e.message,'err'); }
}

// ══════════════════════════════
// IMPRIMIR
// ══════════════════════════════
async function imprimirPedido(id){
  const doc = await colPedidos.doc(id).get();
  const p = {id:doc.id,...doc.data()};
  const lineasHTML = (p.lineas||[]).map(l=>`
    <tr>
      <td style="padding:6px 10px;border:1px solid #aaa;font-weight:600">${l.ref}</td>
      <td style="padding:6px 10px;border:1px solid #aaa">${l.color||''}</td>
      <td style="padding:6px 10px;border:1px solid #aaa;text-align:center">${l.rojo||''}</td>
      <td style="padding:6px 10px;border:1px solid #aaa;text-align:center">${l.natural||''}</td>
      <td style="padding:6px 10px;border:1px solid #aaa;text-align:center">${l.maquina||'—'}</td>
    </tr>`).join('');

  document.getElementById('print-area').innerHTML=`
    <style>@page{margin:10mm;size:A4 portrait;}</style>
    <div style="font-family:Arial,sans-serif;font-size:11px;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6mm;border-bottom:2px solid #000;padding-bottom:4mm;">
        <div>
          <div style="font-size:18px;font-weight:bold">PEDIDO — ${p.cliente}</div>
          <div style="font-size:11px;color:#555;margin-top:2px">${fechaES(p.fecha)} ${p.obs?'· '+p.obs:''}</div>
        </div>
        <img src="logo-ceraplast.png" style="height:16mm;width:auto;">
      </div>
      <table style="width:100%;border-collapse:collapse;">
        <thead><tr>
          <th style="padding:6px 10px;border:1px solid #aaa;background:#e0e0e0;text-align:left">Referencia</th>
          <th style="padding:6px 10px;border:1px solid #aaa;background:#e0e0e0;text-align:left">Color</th>
          <th style="padding:6px 10px;border:1px solid #aaa;background:#e0e0e0;text-align:center">Rojo</th>
          <th style="padding:6px 10px;border:1px solid #aaa;background:#e0e0e0;text-align:center">Natural</th>
          <th style="padding:6px 10px;border:1px solid #aaa;background:#e0e0e0;text-align:center">Máquina</th>
        </tr></thead>
        <tbody>${lineasHTML}</tbody>
      </table>
    </div>`;
  setTimeout(()=>{ window.print(); setTimeout(()=>{ document.getElementById('print-area').innerHTML=''; },1500); },200);
}

// ══════════════════════════════
// HELPERS
// ══════════════════════════════
function cerrarModal(id){ document.getElementById(id).classList.remove('activo'); }
function fechaES(iso){
  if(!iso) return '';
  const p=iso.split('-');
  if(p.length!==3) return iso;
  return p[2]+'/'+p[1]+'/'+p[0];
}
function toast(msg,tipo=''){
  const el=document.getElementById('toast');
  el.textContent=msg; el.className='toast '+(tipo==='ok'?'ok':tipo==='err'?'err':'');
  el.classList.add('show'); setTimeout(()=>el.classList.remove('show'),3500);
}
