<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Etiquetas CERAPLAST</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/estilos_odoo.css">
  <style>
    #print-area{display:none;}
    @media print{
      body > *{display:none !important;}
      #print-area{display:block !important;}
      @page{margin:0;size:A4 portrait;}
    }
  </style>
</head>
<body>
<div class="header">
  <button class="back-btn" onclick="location.href='inicio-ceraplast.html'">← Volver</button>
  <h1 style="color:white;font-size:1.1em">🏷️ Etiquetas — Ceraplast</h1>
  <div style="width:80px"></div>
</div>

<div id="print-area"></div>

<div class="container" style="max-width:400px;text-align:center;padding-top:30px;">
  <button onclick="imprimirEt()" style="background:#00a9e0;color:#fff;border:none;padding:18px 40px;border-radius:14px;font-size:18px;font-weight:700;cursor:pointer;box-shadow:0 4px 14px rgba(0,169,224,.3);">🖨️ ETIQUETAS ANÓNIMAS</button>
</div>

<script>
function buildEt(){
  return `
  <div style="width:210mm;height:148.5mm;box-sizing:border-box;padding:10mm 12mm;font-family:Arial,sans-serif;display:flex;flex-direction:column;justify-content:space-between;border-bottom:1px solid #ccc;">
    <div style="display:flex;justify-content:space-between;font-size:13px;font-weight:600;margin-bottom:3mm;">
      <span>MODELO: &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span>
      <span>COLOR : &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</span>
    </div>
    <div style="border:1.5px solid #000;flex:1;margin-bottom:4mm;position:relative;min-height:40mm;">
      <svg style="position:absolute;top:0;left:0;width:100%;height:100%;" preserveAspectRatio="none">
        <line x1="42%" y1="0%" x2="58%" y2="100%" stroke="#bbb" stroke-width="1"/>
      </svg>
    </div>
    <div style="display:flex;justify-content:space-between;align-items:flex-end;gap:8mm;">
      <div style="flex:1;display:flex;flex-direction:column;gap:5mm;">
        <div style="font-size:30px;font-weight:normal;">Medidas :</div>
        <div style="font-size:30px;font-weight:normal;">Fecha:</div>
        <div style="font-size:30px;font-weight:normal;">Operarios:</div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4mm;">
        <div style="font-size:30px;font-weight:normal;">Uni x Caja :</div>
        <div style="border:1.5px solid #000;width:45mm;height:18mm;"></div>
        <div style="text-align:right;">
          <img src="logo-ceraplast.png" style="max-width:48mm;height:auto;display:block;margin-bottom:1mm;">
          <div style="font-style:italic;font-size:11px;color:#555;">Plastic containers for Candles</div>
        </div>
      </div>
    </div>
  </div>`;
}

function imprimirEt(){
  document.getElementById('print-area').innerHTML =
    `<div style="width:210mm;height:297mm;overflow:hidden;">${buildEt()}${buildEt()}</div>`;
  setTimeout(()=>{ window.print(); setTimeout(()=>{ document.getElementById('print-area').innerHTML=''; },1500); },150);
}
</script>
</body>
</html>
