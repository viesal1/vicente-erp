
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>VICENTE ESPI S.L. - ERP</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #f6f8fa;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px;
        }
        h1 {
            margin-bottom: 30px;
            color: #333;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 900px;
        }
        .card {
            background-color: white;
            border-radius: 15px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            padding: 30px;
            text-align: center;
            font-weight: bold;
            transition: transform 0.2s ease;
            cursor: pointer;
            text-decoration: none;
            color: black;
        }
        .card:hover {
            transform: scale(1.05);
            background-color: #edf2fa;
        }
    </style>
</head>
<body>
    <h1>VICENTE ESPI S.L. - ERP</h1>

        <a class="card" href="produccion.html">Producción</a>

        <a class="card" href="entradas.html">Control de Entradas</a>
    </div>
</body>
</html>
