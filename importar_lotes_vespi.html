function renderPreview() {
  const cont = document.getElementById('listaLotes');
  // Agrupar por categoría
  const grupos = {};
  LOTES.forEach(l => {
    if (!grupos[l.categoria]) grupos[l.categoria] = [];
    grupos[l.categoria].push(l);
  });

  cont.innerHTML = Object.entries(grupos).map(([cat, lotes]) => `
    <div class="categoria-titulo">${cat} — ${lotes.length} lotes</div>
    ${lotes.map(l => `
      <div class="lote-item ${l.estado}">
        <div>
          <div class="lote-codigo">${l.lote}</div>
          <div class="lote-meta">${l.material} · ${l.cantidad||'—'} · ${l.proveedor}</div>
        </div>
        <span class="${l.estado==='en_uso'?'badge-uso':'badge-alm'}">${l.estado==='en_uso'?'EN USO':'ALMACÉN'}</span>
      </div>`).join('')}
  `).join('');
}

async function importar() {
  const btn = document.getElementById('btnImportar');
  btn.disabled = true;
  btn.textContent = '⏳ Importando…';

  let ok = 0;
  const total = LOTES.length;

  for (const lote of LOTES) {
    try {
      await colLotes.add({
        ...lote,
        fechaEntrada: new Date().toISOString(),
        operario: 'TINO',
        controlVisual: 'OK',
        createdAt: new Date().toISOString()
      });
      ok++;
      const pct = Math.round(ok / total * 100);
      document.getElementById('progressBar').style.width = pct + '%';
      document.getElementById('progressText').textContent = `Importando ${ok} de ${total}…`;
    } catch(e) {
      console.error('Error en lote', lote.lote, e);
    }
  }

  document.getElementById('progressText').textContent = `✅ Importados ${ok} de ${total} lotes correctamente`;
  btn.textContent = '✅ Importación completada';
  btn.style.background = '#27ae60';

  toast(`✅ ${ok} lotes importados a Firestore`, 'ok');
}

function toast(msg, tipo='') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast '+(tipo==='ok'?'ok':tipo==='err'?'err':'');
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 4000);
}
</script>
