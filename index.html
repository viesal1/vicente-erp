
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login - ERP Vicente</title>
    <style>
        body {
            background: linear-gradient(135deg, #e0f7fa, #ffffff);
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .login-box {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            text-align: center;
        }
        input {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border: 1px solid #ccc;
            border-radius: 8px;
        }
        button {
            background-color: #0288d1;
            color: white;
            padding: 10px 25px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 10px;
        }
        button:hover {
            background-color: #0277bd;
        }
        h2 {
            color: #333;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>Login - ERP de Vicente</h2>
        <form onsubmit="return validarLogin()">
            <input type="email" id="email" placeholder="Correo" required><br>
            <input type="password" id="password" placeholder="Contraseña" required><br>
            <button type="submit">Entrar</button>
        </form>
        <p id="mensaje" style="color:red; margin-top:15px;"></p>
    </div>

    <script>
        function validarLogin() {
            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;
            const msg = document.getElementById("mensaje");

            if (email === "tino9846@gmail.com" && password === "vicente123") {
                window.location.href = "empresas.html";
            } else {
                msg.textContent = "Correo o contraseña incorrectos";
            }

            return false;
        }
    </script>
</body>
</html>
