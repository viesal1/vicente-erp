<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Almacén — Ceraplast</title>
  <link rel="stylesheet" href="css/estilos_odoo.css">
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
  <script>
    firebase.initializeApp({
      apiKey:"AIzaSyBbO6Q2SPmeX0CD2nLXv5AwRfSFZ_3N7Ro",
      authDomain:"etiquetadora-vespi.firebaseapp.com",
      projectId:"etiquetadora-vespi",
      storageBucket:"etiquetadora-vespi.firebasestorage.app",
      messagingSenderId:"714344837885",
      appId:"1:714344837885:web:d80abbd7a0898e1d1ec494"

  <style>
    .almacen-tabla { width:100%; border-collapse:collapse; font-size:14px; }
    .almacen-tabla th { background:#1e2a44; color:#fff; padding:8px 12px; text-align:left; font-size:12px; font-weight:600; text-transform:uppercase; letter-spacing:.5px; }
    .almacen-tabla td { padding:6px 10px; border:1px solid #dde3ee; vertical-align:middle; }
    .almacen-tabla tr:hover td { background:#f9fafc; }
    .fila-label { font-weight:700; color:#1e2a44; white-space:nowrap; width:60px; background:#f4f7fa !important; }
    .celda-edit { outline:none; width:100%; min-height:24px; cursor:text; font-size:14px; }
    .celda-edit:focus { background:#fffde7; border-radius:4px; }
    .seccion-header { background:#e8ecf1 !important; }
    .seccion-header td { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:1px; color:#7f8c8d; padding:4px 10px !important; }
    #print-area { display:none; }
    @media print {
      *{ -webkit-print-color-adjust:exact !important; print-color-adjust:exact !important; }
      body > *{ display:none !important; }
      #print-area{ display:block !important; }
      @page{ margin:8mm; size:A4 portrait; }
    }
    .tabs{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap;}
    .tab{padding:10px 18px;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;background:#f4f7fa;color:#7f8c8d;transition:all .2s;}
    .tab.activo{background:#1e2a44;color:#fff;}
    .stock-card{background:#fff;border-radius:12px;padding:14px 18px;margin-bottom:10px;box-shadow:0 2px 8px rgba(0,0,0,.06);display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;}
    .stock-nombre{font-weight:700;color:#1e2a44;font-size:1em;}
    .stock-cant{font-size:24px;font-weight:700;color:#1e2a44;}
    .stock-uds{font-size:12px;color:#7f8c8d;}
    .fg{display:flex;flex-direction:column;margin-bottom:10px;}
    .fg label{font-size:11px;font-weight:600;color:#7f8c8d;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;}
    .fg input{padding:10px 12px;border:1px solid #dde3ee;border-radius:10px;font-size:14px;}
    .fg input:focus{outline:none;border-color:#00a9e0;}
    .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;justify-content:center;align-items:flex-start;padding-top:60px;}
    .modal-overlay.activo{display:flex;}
    .modal-box{background:#fff;border-radius:16px;padding:22px;width:92%;max-width:480px;box-shadow:0 20px 60px rgba(0,0,0,.3);max-height:88vh;overflow-y:auto;}
    .modal-box h3{font-size:1.05em;color:#1e2a44;margin-bottom:14px;}
    .btn-ok{background:#00a9e0;color:#fff;}
    .btn-cancel{background:#f4f7fa;color:#1e2a44;}
    .modal-actions{display:flex;gap:10px;margin-top:14px;}
    .modal-actions button{flex:1;padding:12px;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;}
    .toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(80px);background:#1e2a44;color:#fff;padding:12px 20px;border-radius:12px;font-weight:600;font-size:14px;z-index:999;transition:transform .3s ease;pointer-events:none;}
    .toast.show{transform:translateX(-50%) translateY(0);}
    .toast.ok{background:#27ae60;}.toast.err{background:#e74c3c;}
  </style>
</head>
<body>
<div class="header">
  <button class="back-btn" onclick="location.href='inicio-ceraplast.html'">← Volver</button>
  <h1 style="color:white;font-size:1.1em">📦 Almacén — Ceraplast</h1>
  <div style="width:80px"></div>
</div>
<div id="print-area"></div>
<div class="container">
  <div class="tabs">
    <button class="tab activo" onclick="setTab('nave')">🏭 Nave 1</button>
    <button class="tab" onclick="setTab('cajas')">📦 Cajas</button>
    <button class="tab" onclick="setTab('etiquetas')">🏷️ Etiquetas</button>
  </div>

  <!-- TAB NAVE 1 -->
  <div id="tab-nave">
  <div style="display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;align-items:center;">
    <div>
      <label style="font-size:11px;font-weight:600;color:#7f8c8d;text-transform:uppercase;display:block;margin-bottom:4px;">Fecha</label>
      <input type="datetime-local" id="fechaHora" style="padding:9px 12px;border:1px solid #dde3ee;border-radius:10px;font-size:14px;">
    </div>
    <div style="margin-top:20px;display:flex;gap:8px;">
      <button onclick="guardar()" style="background:#27ae60;color:#fff;border:none;padding:11px 18px;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;">💾 Guardar</button>
      <button onclick="imprimir()" style="background:#f39c12;color:#fff;border:none;padding:11px 18px;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;">🖨️ Imprimir</button>
    </div>
  </div>

  <div style="overflow-x:auto;">
    <table class="almacen-tabla">
      <thead><tr>
        <th style="width:70px">Fila</th>
        <th>Contenido (ref = rojo+natural)</th>
      </tr></thead>
      <tbody id="tablaBody"></tbody>
    </table>
  </div>
  </div><!-- fin tab-nave -->

  <!-- TAB CAJAS -->
  <div id="tab-cajas" style="display:none">
    <div style="display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap;">
      <button onclick="abrirModalStock('cajas',null)" style="background:#00a9e0;color:#fff;border:none;padding:12px 20px;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer;">＋ Nuevo tipo de caja</button>
    </div>
    <div id="cajasContainer"></div>
  </div>

  <!-- TAB ETIQUETAS -->
  <div id="tab-etiquetas" style="display:none">
    <div style="display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap;">
      <button onclick="abrirModalStock('etiquetas',null)" style="background:#00a9e0;color:#fff;border:none;padding:12px 20px;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer;">＋ Nuevo tipo de etiqueta</button>
    </div>
    <div id="etiquetasContainer"></div>
  </div>
</div>

<!-- MODAL STOCK -->
<div class="modal-overlay" id="modalStock">
  <div class="modal-box">
    <h3 id="modalStockTitulo">＋ Nuevo tipo</h3>
    <input type="hidden" id="stockTipo">
    <input type="hidden" id="stockEditId">
    <div class="fg"><label>Nombre</label><input type="text" id="stockNombre" placeholder="ej: CAJA NEGRA, V-11 LUMAR…" style="text-transform:uppercase" oninput="this.value=this.value.toUpperCase()"></div>
    <div class="fg"><label>Stock actual (uds)</label><input type="number" id="stockCantidad" placeholder="0" min="0"></div>
    <div class="modal-actions">
      <button class="btn-ok" onclick="guardarStock()">✅ Guardar</button>
      <button class="btn-cancel" onclick="cerrarModal('modalStock')">Cancelar</button>
    </div>
  </div>
</div>

<!-- MODAL MOVIMIENTO -->
<div class="modal-overlay" id="modalMov">
  <div class="modal-box">
    <h3 id="modalMovTitulo">Movimiento de stock</h3>
    <input type="hidden" id="movTipo">
    <input type="hidden" id="movId">
    <div style="display:flex;gap:10px;margin-bottom:14px;">
      <button id="btnEntrada" onclick="setMovTipo('entrada')" style="flex:1;padding:12px;border:2px solid #27ae60;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;background:#d1f5e0;color:#1a7a40;">📥 Entrada</button>
      <button id="btnSalida" onclick="setMovTipo('salida')" style="flex:1;padding:12px;border:2px solid #e74c3c;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;background:#fff;color:#e74c3c;">📤 Salida</button>
    </div>
    <div class="fg"><label>Cantidad</label><input type="number" id="movCantidad" placeholder="0" min="1"></div>
    <div class="fg"><label>Nota (opcional)</label><input type="text" id="movNota" placeholder="ej: Pedido ADISCO, Recepción..."></div>
    <div class="modal-actions">
      <button class="btn-ok" onclick="confirmarMov()">✅ Confirmar</button>
      <button class="btn-cancel" onclick="cerrarModal('modalMov')">Cancelar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// Estructura fija de filas
const FILAS = [
  // Nave 1
  {id:'sep1', tipo:'sep', label:'NAVE 1 — PARED'},
  {id:'f1',  tipo:'fila', label:'1'},
  {id:'f2',  tipo:'fila', label:'2'},
  {id:'f3',  tipo:'fila', label:'3'},
  {id:'f4',  tipo:'fila', label:'4'},
  {id:'f5',  tipo:'fila', label:'5'},
  {id:'f6',  tipo:'fila', label:'6'},
  {id:'f7',  tipo:'fila', label:'7'},
  {id:'f8',  tipo:'fila', label:'8'},
  {id:'f9',  tipo:'fila', label:'9'},
  {id:'f10', tipo:'fila', label:'10'},
  {id:'f11', tipo:'fila', label:'11'},
  {id:'f12', tipo:'fila', label:'12'},
  {id:'f13', tipo:'fila', label:'13'},
  // Tapas
  {id:'sep2', tipo:'sep', label:'TAPAS'},
  {id:'a1',  tipo:'fila', label:'A1'},
  {id:'a2',  tipo:'fila', label:'A2'},
  {id:'b1',  tipo:'fila', label:'B1'},
  {id:'b2',  tipo:'fila', label:'B2'},
  {id:'c1',  tipo:'fila', label:'C-1'},
  {id:'c2',  tipo:'fila', label:'C-2'},
  {id:'d1',  tipo:'fila', label:'D-1'},
  {id:'d2',  tipo:'fila', label:'D-2'},
  {id:'d3',  tipo:'fila', label:'D-3'},
  {id:'cort1',tipo:'fila', label:'CORT-1'},
  {id:'cort2',tipo:'fila', label:'CORT-2'},
  {id:'cort3',tipo:'fila', label:'CORT-3'},
  {id:'cort4',tipo:'fila', label:'CORT-4'},
  // Altillo — celda libre grande
  {id:'sep3',    tipo:'sep',   label:'ALTILLO'},
  {id:'altillo', tipo:'libre', label:'Altillo'},
  // Otra nave
  {id:'sep4',    tipo:'sep',   label:'OTRA NAVE'},
  {id:'otranave',tipo:'libre', label:'Otra nave'},
  // Otros
  {id:'sep5',    tipo:'sep',   label:'OTROS'},
  {id:'otros',   tipo:'libre', label:'Otros'},
];

let db, colAlmacen;
let datos = {}; // {id: contenido}

firebase.auth().onAuthStateChanged(u=>{
  if(!u){ location.href='index.html'; return; }
  db = firebase.firestore();
  colAlmacen = db.collection('almacen_ceraplast');
  // Fecha y hora actuales
  const ahora = new Date();
  const local = new Date(ahora.getTime()-ahora.getTimezoneOffset()*60000).toISOString().slice(0,16);
  document.getElementById('fechaHora').value = local;
  renderTabla();
  cargar();
});

function renderTabla(){
  const tbody = document.getElementById('tablaBody');
  tbody.innerHTML = FILAS.map(f=>{
    if(f.tipo==='sep'){
      return `<tr class="seccion-header"><td colspan="2">${f.label}</td></tr>`;
    }
    if(f.tipo==='libre'){
      return `<tr>
        <td colspan="2" style="padding:4px 8px;border:1px solid #dde3ee;">
          <div class="celda-edit" contenteditable="true" id="celda-${f.id}"
            onblur="datos['${f.id}']=this.innerText.trim()"
            style="min-height:60px;width:100%;white-space:pre-wrap;"
            >${datos[f.id]||''}</div>
        </td>
      </tr>`;
    }
    return `<tr>
      <td class="fila-label">${f.label}</td>
      <td>
        <div class="celda-edit" contenteditable="true" id="celda-${f.id}"
          onblur="datos['${f.id}']=this.innerText.trim()"
          >${datos[f.id]||''}</div>
      </td>
    </tr>`;
  }).join('');
}

async function cargar(){
  try{
    const snap = await colAlmacen.orderBy('createdAt','desc').limit(1).get();
    if(snap.empty) return;
    const doc = snap.docs[0].data();
    datos = doc.datos||{};
    if(doc.fecha) document.getElementById('fechaHora').value = doc.fecha;
    // Rellenar celdas
    FILAS.filter(f=>f.tipo==='fila').forEach(f=>{
      const el = document.getElementById('celda-'+f.id);
      if(el) el.innerText = datos[f.id]||'';
    });
  }catch(e){ console.log('Sin datos previos'); }
}

async function guardar(){
  // Recoger todos los datos actuales
  FILAS.filter(f=>f.tipo==='fila').forEach(f=>{
    const el = document.getElementById('celda-'+f.id);
    if(el) datos[f.id] = el.innerText.trim();
  });
  const registro = {
    fecha: document.getElementById('fechaHora').value,
    datos,
    createdAt: new Date().toISOString()
  };
  try{
    await colAlmacen.add(registro);
    toast('✅ Guardado','ok');
  }catch(e){ toast('❌ '+e.message,'err'); }
}

function imprimir(){
  // Recoger datos actuales
  FILAS.filter(f=>f.tipo==='fila').forEach(f=>{
    const el = document.getElementById('celda-'+f.id);
    if(el) datos[f.id] = el.innerText.trim();
  });

  const fecha = document.getElementById('fechaHora').value.replace('T',' ');

  const filasHTML = FILAS.map(f=>{
    if(f.tipo==='sep'){
      return `<tr><td colspan="2" style="padding:3px 8px;background:#1e2a44;color:#fff;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px">${f.label}</td></tr>`;
    }
    const contenido = (datos[f.id]||'').replace(/\n/g,'<br>');
    if(f.tipo==='libre'){
      return `<tr><td colspan="2" style="padding:6px 8px;border:1px solid #aaa;font-size:10px;white-space:pre-wrap;">${contenido}</td></tr>`;
    }
    return `<tr>
      <td style="padding:4px 8px;border:1px solid #aaa;font-weight:700;font-size:10px;white-space:nowrap;background:#f4f7fa;width:50px">${f.label}</td>
      <td style="padding:4px 8px;border:1px solid #aaa;font-size:10px">${contenido}</td>
    </tr>`;
  }).join('');

  document.getElementById('print-area').innerHTML = `
    <style>@page{margin:8mm;size:A4 portrait;}</style>
    <div style="font-family:Arial,sans-serif;font-size:10px;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5mm;border-bottom:2px solid #000;padding-bottom:3mm;">
        <div>
          <div style="font-size:14px;font-weight:bold">ALMACÉN CERAPLAST</div>
          <div style="font-size:10px;color:#555">nave 1 &nbsp;&nbsp; ${fecha}</div>
        </div>
        <img src="logo-ceraplast.png" style="height:14mm;width:auto;">
      </div>
      <table style="width:100%;border-collapse:collapse;">
        ${filasHTML}
      </table>
    </div>`;
  setTimeout(()=>{ window.print(); setTimeout(()=>{ document.getElementById('print-area').innerHTML=''; },1500); },200);
}

function toast(msg,tipo=''){
  const el=document.getElementById('toast');
  el.textContent=msg; el.className='toast '+(tipo==='ok'?'ok':tipo==='err'?'err':'');
  el.classList.add('show'); setTimeout(()=>el.classList.remove('show'),3500);
}

// ── TABS ──
function setTab(n){
  ['nave','cajas','etiquetas'].forEach(t=>{
    document.getElementById('tab-'+t).style.display=t===n?'':'none';
  });
  document.querySelectorAll('.tab').forEach((el,i)=>{
    el.classList.toggle('activo',['nave','cajas','etiquetas'][i]===n);
  });
  if(n==='cajas') cargarStockTab('cajas');
  if(n==='etiquetas') cargarStockTab('etiquetas');
}

// ── STOCK CAJAS Y ETIQUETAS ──
let movTipoActual='entrada';

async function cargarStockTab(tipo){
  const cont=document.getElementById(tipo+'Container');
  cont.innerHTML='<div class="empty-state"><div class="icon">⏳</div><p>Cargando…</p></div>';
  try{
    const snap=await db.collection('almacen_ceraplast_'+tipo).get();
    if(snap.empty){
      cont.innerHTML='<div class="empty-state"><div class="icon">📭</div><p>Sin tipos. Añade uno.</p></div>';
      return;
    }
    const items=snap.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>a.nombre.localeCompare(b.nombre));
    cont.innerHTML=items.map(item=>`
      <div class="stock-card">
        <div>
          <div class="stock-nombre">${item.nombre}</div>
          <div class="stock-uds">Stock actual</div>
        </div>
        <div style="text-align:center">
          <div class="stock-cant ${item.stock<100?'style="color:#e74c3c"':''}">${item.stock||0}</div>
          <div class="stock-uds">uds</div>
        </div>
        <div style="display:flex;gap:6px;flex-wrap:wrap;">
          <button onclick="abrirMov('${tipo}','${item.id}','${item.nombre}')" style="background:#d1f5e0;color:#1a7a40;border:none;padding:8px 14px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;">📥📤 Movimiento</button>
          <button onclick="abrirModalStock('${tipo}','${item.id}')" style="background:#f4f7fa;color:#1e2a44;border:none;padding:8px 14px;border-radius:8px;font-size:13px;cursor:pointer;">✏️</button>
        </div>
      </div>`).join('');
  }catch(e){ cont.innerHTML='<div class="empty-state"><div class="icon">❌</div><p>Error</p></div>'; }
}

function abrirModalStock(tipo, id){
  document.getElementById('stockTipo').value=tipo;
  document.getElementById('stockEditId').value=id||'';
  document.getElementById('modalStockTitulo').textContent=id?'✏️ Editar':'＋ Nuevo tipo de '+(tipo==='cajas'?'caja':'etiqueta');
  document.getElementById('stockNombre').value='';
  document.getElementById('stockCantidad').value='0';
  document.getElementById('modalStock').classList.add('activo');
}

async function guardarStock(){
  const tipo=document.getElementById('stockTipo').value;
  const id=document.getElementById('stockEditId').value;
  const nombre=document.getElementById('stockNombre').value.trim();
  const stock=parseInt(document.getElementById('stockCantidad').value)||0;
  if(!nombre){ toast('❌ El nombre es obligatorio','err'); return; }
  try{
    const col=db.collection('almacen_ceraplast_'+tipo);
    if(id) await col.doc(id).update({nombre,stock});
    else await col.add({nombre,stock,createdAt:new Date().toISOString()});
    toast('✅ Guardado','ok');
    cerrarModal('modalStock');
    cargarStockTab(tipo);
  }catch(e){ toast('❌ '+e.message,'err'); }
}

function abrirMov(tipo, id, nombre){
  document.getElementById('movTipo').value=tipo;
  document.getElementById('movId').value=id;
  document.getElementById('modalMovTitulo').textContent='📦 '+nombre;
  document.getElementById('movCantidad').value='';
  document.getElementById('movNota').value='';
  movTipoActual='entrada';
  setMovTipo('entrada');
  document.getElementById('modalMov').classList.add('activo');
}

function setMovTipo(t){
  movTipoActual=t;
  document.getElementById('btnEntrada').style.background=t==='entrada'?'#d1f5e0':'#fff';
  document.getElementById('btnSalida').style.background=t==='salida'?'#fdecea':'#fff';
}

async function confirmarMov(){
  const tipo=document.getElementById('movTipo').value;
  const id=document.getElementById('movId').value;
  const cant=parseInt(document.getElementById('movCantidad').value)||0;
  if(!cant){ toast('❌ Introduce una cantidad','err'); return; }
  try{
    const ref=db.collection('almacen_ceraplast_'+tipo).doc(id);
    const doc=await ref.get();
    const stockActual=doc.data().stock||0;
    const nuevoStock=movTipoActual==='entrada'?stockActual+cant:Math.max(0,stockActual-cant);
    await ref.update({stock:nuevoStock,updatedAt:new Date().toISOString()});
    toast(`✅ Stock actualizado: ${nuevoStock} uds`,'ok');
    cerrarModal('modalMov');
    cargarStockTab(tipo);
  }catch(e){ toast('❌ '+e.message,'err'); }
}

function cerrarModal(id){ document.getElementById(id).classList.remove('activo'); }
</script>
</body>
</html>
